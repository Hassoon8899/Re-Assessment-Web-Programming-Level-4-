<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Petrol Calculator</title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main calculator container -->
    <div class="calculator-container">

        <!-- Main heading -->
        <h1>Petrol Calculator</h1>

        <!-- Petrol cost input -->
        <label for="cost">Cost per Liter (£)</label>

        <input 
            type="number" 
            id="cost"
            value="1.72"
            step="0.01">

        <!-- Liters purchased input -->
        <label for="liters">Liters Purchased</label>

        <input 
            type="number"
            id="liters"
            value="0"
            step="0.1">

        <!-- Button to calculate total -->
        <button onclick="calculateTotal()">
            Calculate Total
        </button>

        <!-- Paragraph to display result -->
        <p id="result">
            Total Cost: £0.00
        </p>

    </div>

    <!-- JavaScript section -->
    <script>

        // Function to calculate petrol cost
        function calculateTotal() {

            // Get petrol price value
            let costPerLiter = document.getElementById("cost").value;

            // Get liters purchased value
            let litersPurchased = document.getElementById("liters").value;

            // Calculate total cost
            let total = costPerLiter * litersPurchased;

            // Display result with 2 decimal places
            document.getElementById("result").innerText =
                "Total Cost: £" + total.toFixed(2);
        }

    </script>

</body>
</html>
