<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Photography Gallery</title>

    <!-- External CSS styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main heading -->
    <h1>Nature Photography Gallery</h1>

    <p>
        This gallery contains royalty-free nature images that are legally allowed
        for commercial use.
    </p>

    <!-- Image 1 -->
    <div class="gallery-item">

        <!-- Nature mountain image -->
        <img 
            src="images/mountain.jpg" 
            alt="Snow-covered mountain during sunset"
            width="400"
            height="250"
            title="Mountain Landscape">

        <!-- Copyright/license information -->
        <p class="license">
            License: Free for commercial use from Unsplash.
        </p>
    </div>

    <!-- Image 2 -->
    <div class="gallery-item">

        <!-- Forest image -->
        <img 
            src="images/forest.jpg" 
            alt="Green forest with sunlight shining through trees"
            width="400"
            height="250"
            title="Forest Nature View">

        <!-- Copyright/license information -->
        <p class="license">
            License: Free for commercial use from Pexels.
        </p>
    </div>

    <!-- Image 3 -->
    <div class="gallery-item">

        <!-- Ocean image -->
        <img 
            src="images/ocean.jpg" 
            alt="Blue ocean waves near the beach"
            width="400"
            height="250"
            title="Ocean Waves">

        <!-- Copyright/license information -->
        <p class="license">
            License: Free for commercial use from Pixabay.
        </p>
    </div>

</body>
</html>
